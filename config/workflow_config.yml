    - data:
        code: "def main(predicted_intent: str, predicted_slots: str,\n         current_user_query:\
          \ str, ground_truth_intent: str, ground_slots,\n         current_turn_index:\
          \ int, con_LLM2: str, results: list) -> dict:\n    import json\n\n    def\
          \ flatten_keys(d, result=None):\n        if result is None:\n          \
          \  result = {}\n        for k, v in d.items():\n            if isinstance(v,\
          \ dict):\n                flatten_keys(v, result)\n            else:\n \
          \               result[k] = v\n        return result\n\n    def deep_parse(val):\n\
          \        for _ in range(5):\n            if isinstance(val, (list, dict)):\n\
          \                break\n            if isinstance(val, str):\n         \
          \       try:\n                    val = json.loads(val)\n              \
          \  except:\n                    break\n        return val\n\n    index =\
          \ int(current_turn_index)\n    current_turn_num = index + 1\n\n    # =====\
          \ 解析 con_LLM2，取当前轮 assistant_response =====\n    raw = deep_parse(con_LLM2)\n\
          \    if isinstance(raw, dict):\n        history = raw.get(\"conversation_history\"\
          , [])\n    elif isinstance(raw, list):\n        history = raw\n    else:\n\
          \        history = []\n\n    answer = \"\"\n    if history:\n        last\
          \ = history[-1]\n        if isinstance(last, dict):\n            answer\
          \ = last.get(\"assistant_response\", \"\")\n        history[-1][\"current_turn\"\
          ] = current_turn_num\n\n    answer = str(answer).strip()\n\n    # =====\
          \ 处理 ground_slots =====\n    if isinstance(ground_slots, str):\n       \
          \ try:\n            ground_slots_dict = json.loads(ground_slots)\n     \
          \   except:\n            ground_slots_dict = {}\n    else:\n        ground_slots_dict\
          \ = ground_slots if ground_slots else {}\n\n    # 有 attribute 则取 attribute\
          \ 的值作为槽位名，否则取所有 key\n    if \"attribute\" in ground_slots_dict:\n      \
          \  raw_attr = str(ground_slots_dict[\"attribute\"])\n        required_slots\
          \ = [s.strip() for s in raw_attr.split(\"/\") if s.strip()]\n        ground_display\
          \ = {s: None for s in required_slots}\n    else:\n        required_slots\
          \ = list(ground_slots_dict.keys())\n        ground_display = ground_slots_dict\n\
          \n    # ===== 处理 predicted_slots =====\n    if isinstance(predicted_slots,\
          \ str):\n        try:\n            predicted_slots_dict = json.loads(predicted_slots)\n\
          \        except:\n            predicted_slots_dict = {}\n    else:\n   \
          \     predicted_slots_dict = predicted_slots if predicted_slots else {}\n\
          \n    predicted_slots_flat = flatten_keys(predicted_slots_dict)\n\n    #\
          \ ===== Intent 评估 =====\n    intent_zh_to_en = {\n        \"查询时间\": \"time_schedule\"\
          ,\n        \"查询日程\": \"time_schedule\",\n        \"查询车辆状态\": \"real_time_status\"\
          ,\n        \"查询车辆基本信息\": \"vehicle_basic\",\n        \"查询途经点\": \"location_navigation\"\
          ,\n        \"查询导航\": \"location_navigation\",\n        \"添加途经点\": \"location_navigation\"\
          ,\n        \"取消途经点\": \"location_navigation\",\n        \"继续导航\": \"location_navigation\"\
          ,\n        \"偏好地点\": \"user_preference\",\n        \"查询天气\": \"external_notification\"\
          ,\n        \"查询路况\": \"external_notification\",\n        \"播放音乐\": \"entertainment_media\"\
          ,\n        \"系统设置\": \"system_assist\",\n        \"安全查询\": \"safety_assist\"\
          \n    }\n\n    ground_intents_raw = [g.strip() for g in ground_truth_intent.replace(\"\
          ，\", \",\").split(\"+\")]\n    ground_intents_en = set()\n    for g in ground_intents_raw:\n\
          \        mapped = intent_zh_to_en.get(g)\n        ground_intents_en.add(mapped\
          \ if mapped else g)\n\n    predicted_intents = set([p.strip() for p in predicted_intent.replace(\"\
          ，\", \",\").split(\"+\")])\n\n    intent_hit = len(ground_intents_en & predicted_intents)\
          \ > 0\n    intent_precision = round(len(ground_intents_en & predicted_intents)\
          \ / len(predicted_intents), 2) if predicted_intents else 0\n    intent_recall\
          \ = round(len(ground_intents_en & predicted_intents) / len(ground_intents_en),\
          \ 2) if ground_intents_en else 0\n\n    # ===== Slot 评估 =====\n    slot_hits\
          \ = {}\n    slot_misses = {}\n\n    for slot_key in required_slots:\n  \
          \      if slot_key in predicted_slots_flat:\n            slot_hits[slot_key]\
          \ = {\n                \"ground\": ground_display.get(slot_key),\n     \
          \           \"predicted\": predicted_slots_flat[slot_key]\n            }\n\
          \        else:\n            slot_misses[slot_key] = ground_display.get(slot_key)\n\
          \n    slot_f1 = round(len(slot_hits) / len(required_slots), 2) if required_slots\
          \ else 1.0\n\n    # ===== 结构化 turn 结果 =====\n    turn_result = {\n     \
          \   \"turn\": current_turn_num,\n        \"user_query\": current_user_query,\n\
          \        \"intent\": {\n            \"ground\": ground_truth_intent,\n \
          \           \"predicted\": predicted_intent,\n            \"correct\": intent_hit,\n\
          \            \"precision\": intent_precision,\n            \"recall\": intent_recall\n\
          \        },\n        \"slots\": {\n            \"ground\": ground_display,\n\
          \            \"predicted\": predicted_slots_dict,\n            \"hits\"\
          : slot_hits,\n            \"misses\": slot_misses,\n            \"f1\":\
          \ slot_f1\n        },\n        \"llm_answer\": answer\n    }\n\n    # =====\
          \ 更新 results =====\n    results_list = results if isinstance(results, list)\
          \ else []\n    results_list.append(turn_result)\n    results_list = [r for\
          \ r in results_list if r and r != {}]\n    con_end = [c for c in history\
          \ if c and c != {}]\n\n    return {\n    \"con_end\": [history[-1]] if history\
          \ else [],  # 只返回最后一条\n    \"results_end\": [turn_result],\n    \"current_turn_index\"\
          : current_turn_num\n}"
