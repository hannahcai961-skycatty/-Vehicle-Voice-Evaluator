    - data:
        code: "def main(llm1_text: str, selected_case) -> dict:\n    import json\n\
          \    import re\n\n    # 解析LLM1输出\n    parsed = {}\n    try:\n        json_match\
          \ = re.search(r'\\{[\\s\\S]*\\}', llm1_text)\n        if json_match:\n \
          \           parsed = json.loads(json_match.group())\n    except:\n     \
          \   parsed = {\"intent\": \"\", \"slots\": {}}\n\n    predicted_intent =\
          \ parsed.get(\"intent\", \"\")\n    predicted_slots = parsed.get(\"slots\"\
          , {})\n\n    # 处理selected_case类型\n    if isinstance(selected_case, str):\n\
          \        case_data = json.loads(selected_case)\n    else:\n        case_data\
          \ = selected_case\n\n    # 把entities数组转成category为key的dict\n    entity_map\
          \ = {}\n    for entity in case_data.get(\"entities\", []):\n        category\
          \ = entity.get(\"category\")\n        if category:\n            entity_map[category]\
          \ = entity.get(\"value\", {})\n\n    # intent到模块的映射\n    intent_module_map\
          \ = {\n        \"vehicle_basic\": \"vehicle_basic\",\n        \"real_time_status\"\
          : \"real_time_status\",\n        \"location_navigation\": \"location_navigation\"\
          ,\n        \"time_schedule\": \"time_schedule\",\n        \"user_preference\"\
          : \"user_preference\",\n        \"external_notification\": \"external_notification\"\
          ,\n        \"entertainment_media\": \"entertainment_media\",\n        \"\
          system_assist\": \"system_assist\",\n        \"safety_assist\": \"safety_assist\"\
          \n    }\n\n    # slots里attribute字段到模块字段的映射\n    attribute_field_map = {\n\
          \        # real_time_status\n        \"battery_level\": (\"real_time_status\"\
          , \"battery_level\"),\n        \"current_speed\": (\"real_time_status\"\
          , \"current_speed\"),\n        \"ac_temp\": (\"real_time_status\", \"ac_temp\"\
          ),\n        \"tire_pressure_status\": (\"real_time_status\", \"tire_pressure_status\"\
          ),\n        \"fuel_level\": (\"real_time_status\", \"fuel_level\"),\n  \
          \      # time_schedule\n        \"current_time\": (\"time_schedule\", \"\
          current_time\"),\n        \"current_date\": (\"time_schedule\", \"current_date\"\
          ),\n        \"trip_eta\": (\"time_schedule\", \"trip_eta\"),\n        \"\
          reminder\": (\"time_schedule\", \"reminder\"),\n        # vehicle_basic\n\
          \        \"brand\": (\"vehicle_basic\", \"brand\"),\n        \"model\":\
          \ (\"vehicle_basic\", \"model\"),\n        \"color\": (\"vehicle_basic\"\
          , \"color\"),\n        \"year\": (\"vehicle_basic\", \"year\"),\n      \
          \  \"license_plate\": (\"vehicle_basic\", \"license_plate\"),\n        \"\
          vin\": (\"vehicle_basic\", \"vin_snippet\"),\n        # location_navigation\n\
          \        \"current_poi\": (\"location_navigation\", \"current_poi\"),\n\
          \        \"destination_poi\": (\"location_navigation\", \"destination_poi\"\
          ),\n        \"distance\": (\"location_navigation\", \"distance\"),\n   \
          \     # user_preference\n        \"coffee\": (\"user_preference\", \"preferred_coffee\"\
          ),\n        \"music\": (\"user_preference\", \"preferred_music_genre\"),\n\
          \        \"route\": (\"user_preference\", \"favorite_route\"),\n       \
          \ \"seat_temp\": (\"user_preference\", \"seat_temp_preference\"),\n    \
          \    # external_notification\n        \"weather\": (\"external_notification\"\
          , \"weather\"),\n        \"temperature_outside\": (\"external_notification\"\
          , \"temperature_outside\"),\n        \"air_quality\": (\"external_notification\"\
          , \"air_quality\"),\n        \"traffic_status\": (\"external_notification\"\
          , \"traffic_status\"),\n        \"unread_messages\": (\"external_notification\"\
          , \"unread_messages\"),\n        # entertainment_media\n        \"current_song\"\
          : (\"entertainment_media\", \"current_song\"),\n        \"current_artist\"\
          : (\"entertainment_media\", \"current_artist\"),\n        \"playlist_name\"\
          : (\"entertainment_media\", \"playlist_name\"),\n        \"radio_station\"\
          : (\"entertainment_media\", \"radio_station\"),\n        # system_assist\n\
          \        \"system_notification\": (\"system_assist\", \"system_notification\"\
          ),\n        \"ota_update_status\": (\"system_assist\", \"ota_update_status\"\
          ),\n        \"parking_spot_status\": (\"system_assist\", \"parking_spot_status\"\
          ),\n        # safety_assist\n        \"error_code\": (\"safety_assist\"\
          , \"error_code\"),\n        \"adas_status\": (\"safety_assist\", \"adas_status\"\
          ),\n        \"seatbelt_status\": (\"safety_assist\", \"seatbelt_status\"\
          ),\n    }\n\n    retrieved = {}\n\n    # 优先根据slots里的attribute精准抽取字段\n  \
          \  attribute = predicted_slots.get(\"attribute\", \"\")\n    if attribute\
          \ and attribute in attribute_field_map:\n        module, field = attribute_field_map[attribute]\n\
          \        if module in entity_map and field in entity_map[module]:\n    \
          \        retrieved[attribute] = entity_map[module][field]\n\n    # 对于非attribute类槽位（poi_type/action/destination/relation等）\n\
          \    # 根据intent返回整个模块（因为需要完整导航数据支撑回答）\n    if not retrieved:\n        intents\
          \ = [i.strip() for i in predicted_intent.replace(\"，\", \",\").split(\"\
          +\")]\n        for intent in intents:\n            module = intent_module_map.get(intent)\n\
          \            if module and module in entity_map:\n                retrieved[module]\
          \ = entity_map[module]\n\n    if not retrieved:\n        retrieved_text\
          \ = \"未检索到相关车辆数据\"\n    else:\n        retrieved_text = json.dumps(retrieved,\
          \ ensure_ascii=False, indent=2)\n\n    return {\n        \"retrieved_data\"\
          : retrieved_text,\n        \"predicted_intent\": predicted_intent,\n   \
          \     \"predicted_slots\": json.dumps(predicted_slots, ensure_ascii=False),\n\
          \    }"
