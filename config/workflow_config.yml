    - data:
        code: "def main(results: list) -> dict:\n    import json\n\n    # ==========\
          \ 权重配置（调参区）==========\n    INTENT_WEIGHT = 0.5\n    SLOT_WEIGHT   = 0.5\n\
          \    # =======================================\n\n    valid = [r for r in\
          \ results if r and r != {} and \"intent\" in r]\n\n    if not valid:\n \
          \       return {\n            \"total_turns\":          \"0\",\n       \
          \     \"intent_accuracy\":      \"0.0\",\n            \"intent_precision_avg\"\
          : \"0.0\",\n            \"intent_recall_avg\":    \"0.0\",\n           \
          \ \"slot_f1_avg\":          \"0.0\",\n            \"objective_score\": \
          \     \"0.0\",\n            \"turn_details\":         [],\n            \"\
          error\":                \"results 为空或无有效数据\"\n        }\n\n    total = len(valid)\n\
          \n    intent_correct_count = sum(1 for r in valid if r[\"intent\"].get(\"\
          correct\", False))\n    intent_accuracy      = round(intent_correct_count\
          \ / total, 4)\n    intent_precision_avg = round(sum(r[\"intent\"].get(\"\
          precision\", 0) for r in valid) / total, 4)\n    intent_recall_avg    =\
          \ round(sum(r[\"intent\"].get(\"recall\",    0) for r in valid) / total,\
          \ 4)\n    slot_f1_avg          = round(sum(r[\"slots\"].get(\"f1\",    \
          \     0) for r in valid) / total, 4)\n\n    objective_score = round(\n \
          \       (intent_accuracy * INTENT_WEIGHT + slot_f1_avg * SLOT_WEIGHT) *\
          \ 100, 2\n    )\n\n    turn_details = [\n        {\n            \"turn\"\
          :             r[\"turn\"],\n            \"user_query\":       r[\"user_query\"\
          ],\n            \"intent_correct\":   r[\"intent\"].get(\"correct\",   False),\n\
          \            \"intent_ground\":    r[\"intent\"].get(\"ground\",    \"\"\
          ),\n            \"intent_predicted\": r[\"intent\"].get(\"predicted\", \"\
          \"),\n            \"slot_f1\":          r[\"slots\"].get(\"f1\",       \
          \  0.0),\n            \"slot_misses\": json.dumps(r[\"slots\"].get(\"misses\"\
          , {}), ensure_ascii=False),\n            \"llm_answer\":       r.get(\"\
          llm_answer\",          \"\"),\n        }\n        for r in valid\n    ]\n\
          \n    return {\n        \"total_turns\":          str(total),\n        \"\
          intent_accuracy\":      str(intent_accuracy),\n        \"intent_precision_avg\"\
          : str(intent_precision_avg),\n        \"intent_recall_avg\":    str(intent_recall_avg),\n\
          \        \"slot_f1_avg\":          str(slot_f1_avg),\n        \"objective_score\"\
          :      str(objective_score),\n        \"turn_details\":    \n         json.dumps(turn_details,\
          \ ensure_ascii=False),\n        \"error\":                \"\"\n    }"
        code_language: python3
