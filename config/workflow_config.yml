    - data:
        code: "import json\n\ndef main(test_cases: str) -> dict:\n    try:\n     \
          \   # 去掉首尾多余的引号（CSV双重转义导致）\n        cleaned = test_cases.strip('\"')\n \
          \       # 把 \"\" 还原成 \"\n        cleaned = cleaned.replace('\"\"', '\"')\n\
          \        # 解析成对象\n        case_obj = json.loads(cleaned)\n        return\
          \ {\n            \"case\": case_obj,\n            \"case_id\": case_obj.get(\"\
          case_id\", \"\"),\n            \"error\": \"\"\n        }\n    except Exception\
          \ as e:\n        return {\n            \"case\": {},\n            \"case_id\"\
          : \"\",\n            \"error\": str(e)\n        }"
