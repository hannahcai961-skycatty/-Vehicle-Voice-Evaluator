    - data:
        code: "def main(judge_text: str) -> dict:\n    import json\n    import re\n\
          \n    # ===== 清洗：去掉可能的 markdown 代码块包裹 =====\n    cleaned = judge_text.strip()\n\
          \    cleaned = re.sub(r'^```json\\s*', '', cleaned)\n    cleaned = re.sub(r'^```\\\
          s*',     '', cleaned)\n    cleaned = re.sub(r'\\s*```$',     '', cleaned)\n\
          \    cleaned = cleaned.strip()\n\n    # ===== 兜底：从文本中找第一个完整 JSON 对象 =====\n\
          \    try:\n        parsed = json.loads(cleaned)\n    except json.JSONDecodeError:\n\
          \        match = re.search(r'\\{[\\s\\S]*\\}', cleaned)\n        if match:\n\
          \            try:\n                parsed = json.loads(match.group())\n\
          \            except:\n                return {\n                    \"score\"\
          :      \"0\",\n                    \"reasoning\":  \"JSON解析失败\",\n     \
          \               \"weak_turns\": \"[]\",\n                    \"strengths\"\
          :  \"\",\n                    \"weaknesses\": \"\",\n                  \
          \  \"error\":      f\"原始输出：{judge_text[:200]}\"\n                }\n   \
          \     else:\n            return {\n                \"score\":      \"0\"\
          ,\n                \"reasoning\":  \"未找到JSON内容\",\n                \"weak_turns\"\
          : \"[]\",\n                \"strengths\":  \"\",\n                \"weaknesses\"\
          : \"\",\n                \"error\":      f\"原始输出：{judge_text[:200]}\"\n\
          \            }\n\n    # ===== 提取并校验各字段 =====\n    raw_score = parsed.get(\"\
          score\", 0)\n    try:\n        score = int(raw_score)\n        score = max(1,\
          \ min(5, score))   # 强制夹在 1-5\n    except:\n        score = 0\n\n    weak_turns\
          \ = parsed.get(\"weak_turns\", [])\n    if not isinstance(weak_turns, list):\n\
          \        weak_turns = []\n\n    return {\n        \"score\":      str(score),\n\
          \        \"reasoning\":  str(parsed.get(\"reasoning\",  \"\")),\n      \
          \  \"weak_turns\": json.dumps(weak_turns, ensure_ascii=False),\n       \
          \ \"strengths\":  str(parsed.get(\"strengths\",  \"\")),\n        \"weaknesses\"\
          : str(parsed.get(\"weaknesses\", \"\")),\n        \"error\":      \"\"\n\
          \    }"
