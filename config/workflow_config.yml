    - data:
        code: "def main(data_dict: list) -> dict:\n    import json\n    \n    # 1.\
          \ 处理字符串输入\n    if isinstance(data_dict, str):\n        try:\n          \
          \  query_data = json.loads(data_dict)\n        except json.JSONDecodeError:\n\
          \            query_data = []\n    else:\n        query_data = data_dict\n\
          \    \n    # 2. 解包列表：如果最外层是列表，取第一个元素看看结构\n    # 目的：处理 [ { \"turns\": [...]\
          \ } ] 这种情况\n    temp_item = None\n    if isinstance(query_data, list) and\
          \ len(query_data) > 0:\n        temp_item = query_data[0]\n    \n    # 3.\
          \ 【核心逻辑】判断数据结构类型\n    final_turns = []\n    \n    # 情况 A：输入直接就是 turns 列表\
          \ (你提供的最新数据格式)\n    # 特征：query_data 是列表，且第一个元素里有 \"turn\" 字段\n    if isinstance(query_data,\
          \ list) and len(query_data) > 0:\n        first_item = query_data[0]\n \
          \       if isinstance(first_item, dict) and \"turn\" in first_item:\n  \
          \          final_turns = query_data\n        # 情况 B：输入是包裹了一层对象的结构 [ { \"\
          turns\": [...] } ]\n        elif isinstance(first_item, dict) and \"turns\"\
          \ in first_item:\n            final_turns = first_item.get(\"turns\", [])\n\
          \            \n    # 情况 C：输入已经是字典对象 { \"turns\": [...] }\n    elif isinstance(query_data,\
          \ dict):\n        final_turns = query_data.get(\"turns\", [])\n        \n\
          \    # 4. 确保提取到的是列表\n    if not isinstance(final_turns, list):\n       \
          \ final_turns = []\n    \n    # 5. 排序：按 \"turn\" 字段数字从小到大排序\n    sorted_turns\
          \ = sorted(\n        final_turns, \n        key=lambda x: x.get(\"turn\"\
          , 0) if isinstance(x, dict) else 0\n    )\n    \n    return {\n        \"\
          turns\": sorted_turns,\n        \"total_turns\": len(sorted_turns),\n  \
          \      \"con_history\": [{}],\n        \"results\": [{}]\n    }\n"
