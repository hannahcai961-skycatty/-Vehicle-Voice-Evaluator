    - data:
        code: "def main(\n    objective_score: str,\n    intent_accuracy: str,\n \
          \   slot_f1_avg: str,\n    total_turns: str,\n    turn_details: str,\n \
          \   score: str,\n    reasoning: str,\n    weak_turns: str,\n    strengths:\
          \ str,\n    weaknesses: str\n) -> dict:\n    import json\n\n    # ==========\
          \ 权重配置（调参区）==========\n    OBJECTIVE_WEIGHT  = 0.4\n    SUBJECTIVE_WEIGHT\
          \ = 0.6\n    # =======================================\n\n    try:\n   \
          \     obj_score      = float(objective_score)\n        subj_score_raw =\
          \ float(score)\n        subj_score     = subj_score_raw * 20\n\n       \
          \ intent_acc = float(intent_accuracy)\n        slot_f1    = float(slot_f1_avg)\n\
          \        turns      = int(total_turns)\n\n        # ===== 修复点：turn_details\
          \ 是字符串，需要先解析 =====\n        try:\n            turn_details_list = json.loads(turn_details)\n\
          \            if not isinstance(turn_details_list, list):\n             \
          \   turn_details_list = []\n        except Exception:\n            turn_details_list\
          \ = []\n\n        try:\n            weak_turns_list = json.loads(weak_turns)\n\
          \            if not isinstance(weak_turns_list, list):\n               \
          \ weak_turns_list = []\n        except Exception:\n            weak_turns_list\
          \ = []\n\n        if subj_score_raw == 0:\n            final_score = round(obj_score,\
          \ 2)\n            score_mode  = \"客观分降级（Judge解析失败）\"\n        else:\n  \
          \          final_score = round(obj_score * OBJECTIVE_WEIGHT + subj_score\
          \ * SUBJECTIVE_WEIGHT, 2)\n            score_mode  = \"客观+主观综合\"\n\n   \
          \     failed_intents = [\n            {\n                \"turn\":     \
          \  d[\"turn\"],\n                \"query\":      d[\"user_query\"],\n  \
          \              \"ground\":     d[\"intent_ground\"],\n                \"\
          predicted\":  d[\"intent_predicted\"],\n                \"llm_answer\":\
          \ d.get(\"llm_answer\", \"\"),\n            }\n            for d in turn_details_list\n\
          \            if isinstance(d, dict) and not d.get(\"intent_correct\", True)\n\
          \        ]\n\n        failed_slots = [\n            {\n                \"\
          turn\":       d[\"turn\"],\n                \"query\":      d[\"user_query\"\
          ],\n                \"misses\":     d[\"slot_misses\"],\n              \
          \  \"f1\":         d[\"slot_f1\"],\n                \"llm_answer\": d.get(\"\
          llm_answer\", \"\"),\n            }\n            for d in turn_details_list\n\
          \            if isinstance(d, dict) and d.get(\"slot_f1\", 1.0) < 1.0\n\
          \        ]\n\n        if final_score >= 90:\n            grade = \"优秀\"\n\
          \        elif final_score >= 75:\n            grade = \"良好\"\n        elif\
          \ final_score >= 60:\n            grade = \"及格\"\n        else:\n      \
          \      grade = \"不及格\"\n\n        # ===== 展示用格式化数值 =====\n        intent_accuracy_pct\
          \ = str(round(intent_acc * 100, 1)) + \"%\"\n        slot_f1_pct       \
          \  = str(round(slot_f1    * 100, 1)) + \"%\"\n        subj_score_display\
          \  = str(subj_score_raw) + \" / 5\"\n\n        return {\n            \"\
          final_score\":      str(final_score),\n            \"grade\":          \
          \  grade,\n            \"score_mode\":       score_mode,\n            \"\
          objective_score\":  str(obj_score),\n            \"subjective_score\": str(round(subj_score,\
          \ 2)),\n            \"subjective_raw\":   str(subj_score_raw),\n       \
          \     \"intent_accuracy\":  str(intent_acc),\n            \"slot_f1_avg\"\
          :      str(slot_f1),\n            \"total_turns\":      str(turns),\n  \
          \          \"reasoning\":        reasoning,\n            \"strengths\":\
          \        strengths,\n            \"weaknesses\":       weaknesses,\n   \
          \         \"weak_turns\":       json.dumps(weak_turns_list,  ensure_ascii=False),\n\
          \            \"failed_intents\":   json.dumps(failed_intents,   ensure_ascii=False),\n\
          \            \"failed_slots\":     json.dumps(failed_slots,     ensure_ascii=False),\n\
          \            \"intent_accuracy_pct\": intent_accuracy_pct,\n           \
          \ \"slot_f1_pct\":         slot_f1_pct,\n            \"subj_score_display\"\
          :  subj_score_display,\n            \"error\":            \"\"\n       \
          \ }\n\n    except Exception as e:\n        return {\n            \"final_score\"\
          : \"0\", \"grade\": \"错误\", \"score_mode\": \"异常\",\n            \"objective_score\"\
          : \"\", \"subjective_score\": \"\", \"subjective_raw\": \"\",\n        \
          \    \"intent_accuracy\": \"\", \"slot_f1_avg\": \"\", \"total_turns\":\
          \ \"\",\n            \"reasoning\": \"\", \"strengths\": \"\", \"weaknesses\"\
          : \"\",\n            \"weak_turns\": \"[]\", \"failed_intents\": \"[]\"\
          , \"failed_slots\": \"[]\",\n            \"intent_accuracy_pct\": \"\",\
          \ \"slot_f1_pct\": \"\", \"subj_score_display\": \"\",\n            \"error\"\
          : str(e)\n        }"
