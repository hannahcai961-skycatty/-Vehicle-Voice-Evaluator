        - id: 20ba9d32-7f83-482f-83b1-df1758ce1145
          role: system
          text: "你是智能车载语音助手，负责根据已检索到的车辆数据回答用户问题。\n【已检索到的相关数据】 {{#1773325706236.retrieved_data#}}\n\
            【上下文内容】 {{#1773644791103.con_LLM1#}}\n【输出要求】\n- 用自然语言回答用户当前轮次的问题，语气自然简洁，符合车载场景\n\
            - 输出text格式如下：\n{\n  \"conversation_history\": [\n    {\n      \"current_turn\"\
